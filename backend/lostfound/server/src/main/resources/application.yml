# 主配置文件：公共基础配置，dev/prod 都会加载
spring:
  # 应用名称
  application:
    name: lost-found

  # 激活环境，默认 dev
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 支持加载外部 .env 配置文件
  config:
    import: optional:file:.env[.properties]

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB      # 单个文件最大 10MB
      max-request-size: 50MB   # 整个请求最大 50MB

  # 数据库驱动
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 默认配置（可被环境配置覆盖）
  data:
    redis:
      url: ${SPRING_REDIS_URL:redis://localhost:6379/10}

# 服务端口（可被环境配置覆盖）
server:
  port: ${SERVER_PORT:8080}

# 日志级别
logging:
  level:
    root: ${LOG_LEVEL:INFO}

# MyBatis-Plus 全局配置
mybatis-plus:
  # Mapper XML 路径
  mapper-locations: classpath:mapper/*.xml
  # 实体类别名包
  type-aliases-package: com.qg.pojo
  configuration:
    map-underscore_to_camel_case: true  # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 打印
    auto-mapping-behavior: FULL         # 全自动映射
    use-generated-keys: true            # 主键自增回写
    cache-enabled: true                 # 开启二级缓存

# JWT 配置
jwt:
  sign-key: ${JWT_SIGN_KEY}                      # 主密钥
  expire: ${JWT_EXPIRE}                         # Token 过期时间
  refresh-expire: ${JWT_REFRESH_EXPIRE}         # 刷新 Token 过期时间
  refresh-sign-key: ${JWT_REFRESH_SIGN_KEY}     # 刷新密钥

# 阿里云 OSS 基础配置
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT}
    region: ${OSS_REGION:cn-beijing}

# SpringDoc + Swagger 接口文档
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# 企业微信告警配置
risk:
  wecom:
    enabled: true
    webhook: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxxx